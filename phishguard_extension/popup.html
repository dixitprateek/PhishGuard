<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PhishGuard</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;600;700;800&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:        #0a0a0f;
      --surface:   #13131a;
      --border:    #1e1e2e;
      --text:      #e2e2f0;
      --muted:     #6b6b8a;
      --safe:      #00e5a0;
      --danger:    #ff3e6c;
      --warn:      #ffb547;
      --accent:    #7c6af7;
    }

    body {
      width: 340px;
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      overflow: hidden;
    }

    /* ── Header ─────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 18px 14px;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      width: 28px; height: 28px;
      background: var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
    }

    .header-text h1 {
      font-size: 15px; font-weight: 800;
      letter-spacing: 0.04em;
    }

    .header-text span {
      font-size: 10px; color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
    }

    .status-dot {
      margin-left: auto;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--safe);
      box-shadow: 0 0 6px var(--safe);
      animation: pulse 2s infinite;
    }

    .status-dot.offline { background: var(--danger); box-shadow: 0 0 6px var(--danger); animation: none; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    /* ── URL bar ─────────────────────────────── */
    .url-section {
      padding: 14px 18px 10px;
    }

    .url-label {
      font-size: 9px; font-weight: 600;
      letter-spacing: 0.12em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .url-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Result card ─────────────────────────── */
    .result-card {
      margin: 0 18px 14px;
      border-radius: 12px;
      padding: 16px;
      border: 1px solid var(--border);
      background: var(--surface);
      position: relative;
      overflow: hidden;
      min-height: 110px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      transition: border-color 0.3s;
    }

    .result-card::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0.06;
      border-radius: inherit;
      transition: background 0.3s;
    }

    .result-card.safe   { border-color: var(--safe);   }
    .result-card.safe::before   { background: var(--safe); }
    .result-card.danger { border-color: var(--danger); }
    .result-card.danger::before { background: var(--danger); }
    .result-card.warn   { border-color: var(--warn);   }
    .result-card.warn::before   { background: var(--warn); }

    .result-loading {
      display: flex; align-items: center; gap: 10px;
      color: var(--muted); font-size: 12px;
    }

    .spinner {
      width: 18px; height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .result-verdict {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 10px;
    }

    .verdict-icon {
      font-size: 28px; line-height: 1;
    }

    .verdict-text h2 {
      font-size: 18px; font-weight: 800;
      letter-spacing: 0.02em;
    }

    .verdict-text h2.safe   { color: var(--safe);   }
    .verdict-text h2.danger { color: var(--danger); }
    .verdict-text h2.warn   { color: var(--warn);   }

    .verdict-text p {
      font-size: 10px; color: var(--muted);
      margin-top: 2px;
      font-family: 'JetBrains Mono', monospace;
    }

    /* Confidence bar */
    .conf-row {
      display: flex; align-items: center; gap: 8px;
    }

    .conf-label {
      font-size: 9px; color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
      width: 60px; flex-shrink: 0;
    }

    .conf-bar-bg {
      flex: 1; height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    .conf-bar-fill {
      height: 100%; border-radius: 2px;
      transition: width 0.5s ease;
    }

    .conf-bar-fill.safe   { background: var(--safe);   }
    .conf-bar-fill.danger { background: var(--danger); }
    .conf-bar-fill.warn   { background: var(--warn);   }

    .conf-pct {
      font-size: 10px; font-weight: 600;
      font-family: 'JetBrains Mono', monospace;
      width: 34px; text-align: right; flex-shrink: 0;
    }

    /* ── Scan button ─────────────────────────── */
    .scan-btn {
      display: flex; align-items: center; justify-content: center;
      gap: 7px;
      margin: 0 18px 14px;
      padding: 10px;
      background: var(--accent);
      color: #fff;
      border: none; border-radius: 9px;
      font-family: 'Syne', sans-serif;
      font-size: 12px; font-weight: 700;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      text-transform: uppercase;
    }

    .scan-btn:hover  { opacity: 0.88; }
    .scan-btn:active { transform: scale(0.97); }
    .scan-btn:disabled { opacity: 0.4; cursor: default; transform: none; }

    /* ── Footer ─────────────────────────────── */
    .footer {
      border-top: 1px solid var(--border);
      padding: 10px 18px;
      display: flex; align-items: center; justify-content: space-between;
    }

    .footer-stat {
      font-size: 9px; color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
    }

    .footer-stat span { color: var(--text); font-weight: 600; }

    .dash-link {
      font-size: 9px; color: var(--accent);
      text-decoration: none; font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .dash-link:hover { text-decoration: underline; }

    /* ── Error state ─────────────────────────── */
    .error-msg {
      color: var(--danger);
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      text-align: center;
      padding: 4px 0;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="logo">🛡</div>
    <div class="header-text">
      <h1>PHISHGUARD</h1>
      <span>ML-POWERED URL SCANNER</span>
    </div>
    <div class="status-dot" id="statusDot"></div>
  </div>

  <!-- Current URL -->
  <div class="url-section">
    <div class="url-label">Current Page</div>
    <div class="url-box" id="currentUrl">Loading…</div>
  </div>

  <!-- Result card -->
  <div class="result-card" id="resultCard">
    <div class="result-loading" id="loadingState">
      <div class="spinner"></div>
      <span>Scanning…</span>
    </div>

    <div id="resultState" style="display:none;">
      <div class="result-verdict">
        <div class="verdict-icon" id="verdictIcon"></div>
        <div class="verdict-text">
          <h2 id="verdictLabel"></h2>
          <p id="verdictSub"></p>
        </div>
      </div>
      <div class="conf-row">
        <span class="conf-label">CONFIDENCE</span>
        <div class="conf-bar-bg">
          <div class="conf-bar-fill" id="confBar" style="width:0%"></div>
        </div>
        <span class="conf-pct" id="confPct"></span>
      </div>
    </div>

    <div id="errorState" style="display:none;">
      <div class="error-msg" id="errorMsg"></div>
    </div>
  </div>

  <!-- Scan button -->
  <button class="scan-btn" id="scanBtn">
    ⟳ &nbsp;RESCAN
  </button>

  <!-- Footer -->
  <div class="footer">
    <div class="footer-stat">SCANS TODAY: <span id="scanCount">—</span></div>
    <span class="dash-link" id="dashLink" style="cursor:pointer">Dashboard →</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
